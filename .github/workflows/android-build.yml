name: Build ARVIN APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build APK
        run: |
         cd android-app
         ./gradlew assembleDebug || true

      - name: Install Gradle
        run: sudo apt-get install gradle -y

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arvin-apk
          path: android-app/app/build/outputs/apk/debug/*.apk
